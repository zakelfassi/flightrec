name: Bug report
description: Something in flightrec is not working correctly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search existing issues to avoid duplicates.

        If this is a **security vulnerability**, do NOT file it here — use the
        [private advisory flow](https://github.com/zakelfassi/flightrec/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: flightrec version
      description: Output of `flightrec --version`
      placeholder: "flightrec 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux x86_64
        - Linux aarch64
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config (config.toml)
      description: |
        Paste your `$FLIGHTREC_HOME/config.toml`. Redact any API keys before pasting.
      render: toml

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps starting from a clean state.
      placeholder: |
        1. FLIGHTREC_HOME=$(mktemp -d) flightrec init
        2. flightrec watch --once
        3. ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste relevant output from `flightrec` (with `RUST_LOG=debug` if helpful).
        Truncate to the relevant section.
      render: shell
