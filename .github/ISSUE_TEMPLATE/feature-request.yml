name: Feature request
description: Propose a new feature or improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please search existing issues first —
        your idea may already be tracked.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Who is affected and how often?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Describe the feature. If it is a CLI change, sketch the command/flag syntax.
        If it is a config or output change, show the before/after.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you prefer your proposal.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related issues, screenshots, or anything else relevant.
