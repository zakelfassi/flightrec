[watch]
roots = [
    "~/projects/my-app",
]

[filter]
include = [
    "**/*.md",
    "**/*.rs",
    "**/*.toml",
    "**/*.json",
    "**/*.yml",
    "**/*.yaml",
    "**/*.py",
    "**/*.ts",
    "**/*.js",
]
exclude = [
    "**/.git/**",
    "**/target/**",
    "**/node_modules/**",
    "**/*.log",
]

[daemon]
interval_seconds = 60

[llm]
enabled = true
provider = "ollama"
model = "llama3.2"
base_url = "http://localhost:11434"
max_changes_per_prompt = 30

[output]
json_log_dir = "~/.flightrec/logs"
